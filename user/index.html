<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <script defer src="src/game.js"></script>
    <title>Snake Game</title>
</head>
<body>
    <div class="allScreen">
        <button id="settingsBtn">
            <img src="src/ico_display_settings.svg" alt="Settings"/>
        </button>
        <div class="settings hidden" id="settingsMenu">
            <div class="settingsContent">
                <h2>Configurações</h2>

                <div class="setting">
                    <input type="checkbox" id="gridToggle">
                    <label for="gridToggle">Mostrar grade</label>
                </div>
                <div class="setting">
                    <input type="color" id="fruitColor" value="#ffcc00">
                    <label for="fruitColor">Cor das frutas</label>
                </div>
                <div class="setting">
                    <input type="color" id="barerColor" value="#ffcc00">
                    <label for="barerColor">Cor das barreiras</label>
                </div>

                <div class="sameLine">
                    <button id="saveSettingsBtn">Salvar</button>
                    <button id="closeSettingsBtn">Fechar</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container" id="menuContainer">
        <div class="logo">
            <h1>Snake Game Online</h1>
        </div>
        <div class="ui">
            <input id="nameInput" placeholder="Seu nome" maxlength="12">
            <button id="joinBtn">Entrar</button>
        </div>
    </div>
    <div class="container hidden" id="gameContainer">  
        <canvas id="game"></canvas>
    </div>
</body>
</html>
