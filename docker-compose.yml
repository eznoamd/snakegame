version: '3.8'

services:
  snake-game-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snake-game-server
    ports:
      - "3000:3000/udp"
      - "8080:8080"
      - "3001:3001/udp"
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m